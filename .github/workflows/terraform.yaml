name: Terraform CI/CD

on:
  workflow_dispatch:
   inputs:
     apply:
       description: 'Apply Terraform changes'
       required: true
       default: 'false'
       type: choice
       options:
          - 'true'
          - 'false'
     destroy-plan:
       description: 'Plan Destroy Terraform resources'
       required: true
       default: 'false'
       type: choice
       options:
          - 'true'
          - 'false'
     destroy:
       description: 'Destroy Terraform resources'
       required: true
       default: 'false'
       type: choice
       options:
          - 'true'
          - 'false'
permissions:
  id-token: write   
  contents: read

jobs:
  job1:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: "Configure AWS Credentials" 
        uses: aws-actions/configure-aws-credentials@v6.0.0 
        with: 
          role-to-assume: arn:aws:iam::315164662788:role/GitHubInfraRole
          aws-region: us-east-1  

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate 

      - name: Terraform Plan
        run: terraform plan -out=tfplan
      
      - name: Terraform Apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Plan Destroy
        if: ${{ github.event.inputs['destroy-plan'] == 'true' }}
        run: terraform plan -destroy -out=tfplan-destroy
      
      - name: Terraform Destroy
        if: ${{ github.event.inputs.destroy == 'true' }}
        run: terraform apply -auto-approve tfplan-destroy 